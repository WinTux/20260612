version: '3.8'

services:
  web:
    build: .
    ports:
      - "5002:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: 123456ABCxyz
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
